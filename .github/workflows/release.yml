# Kalite kapısı → GitHub Release + debug APK.
#
# Tetikleme:
# 1) Tag push: git tag v1.0.1 && git push origin v1.0.1
# 2) Elle: Actions → Release → "Run workflow" → branch + etiket (örn. v1.0.1)
#
# Manuel çalıştırmada etiket seçilen commit üzerinde oluşturulur (GitHub Release + tag).
#
# iOS .ipa: sertifika gerekir; bu workflow yok.
# Mağaza üretimi: EAS Build / Xcode.

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git etiketi (örn. v1.0.1). Seçtiğin branch’in son commit’ine bağlanır.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:ci

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          fail_ci_if_error: false

  android-debug-apk:
    needs: quality-gate
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Validate release tag
        run: |
          TAG="${RELEASE_TAG}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+ ]]; then
            echo "::error title=Invalid tag::Etiket v1.0.0 formatında olmalı (gelen: $TAG)"
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('package-lock.json', 'app.json') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci
        env:
          CI: true

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Assemble debug APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Stage APK for release
        run: |
          mkdir -p release-assets
          cp android/app/build/outputs/apk/debug/app-debug.apk \
            "release-assets/thy-assistant-${RELEASE_TAG}-debug.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          files: release-assets/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
